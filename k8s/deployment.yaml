apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v14.6
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: postgrest-superuser
            - configMapRef:
                name: postgrest-config
